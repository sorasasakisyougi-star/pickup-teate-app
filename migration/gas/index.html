<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <title>送迎報告</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, -apple-system, "Hiragino Sans", Meiryo, sans-serif;
           padding: 16px; max-width: 520px; margin: 0 auto; background: #f7f7f8; color: #1a1a1a; }
    h1 { font-size: 20px; margin: 0 0 12px; }
    .row { display: flex; flex-direction: column; gap: 6px; margin: 10px 0; }
    label { font-size: 13px; color: #444; }
    input, select, textarea { padding: 10px 12px; font-size: 16px;
                              border: 1px solid #ccc; border-radius: 8px; background: white; }
    input:focus, select:focus, textarea:focus { outline: 2px solid #3158d8; border-color: transparent; }
    .readonly { padding: 10px 12px; font-size: 16px; border: 1px solid #ddd;
                border-radius: 8px; background: #f0f0f2; color: #333; }
    .mode-toggle { display: flex; gap: 8px; }
    .mode-toggle button { flex: 1; padding: 12px; font-size: 15px; font-weight: 700;
                          border: 1px solid #ccc; border-radius: 8px; background: white; cursor: pointer; }
    .mode-toggle button.active { background: #3158d8; color: white; border-color: #3158d8; }
    .arrivals .arrival-row { display: flex; gap: 6px; align-items: center; }
    .arrivals select { flex: 1; }
    .arrivals button.remove { padding: 6px 10px; border: 1px solid #ccc; background: white;
                              border-radius: 6px; cursor: pointer; }
    .arrivals .add-btn { margin-top: 6px; padding: 10px; background: white; border: 1px dashed #888;
                         border-radius: 8px; cursor: pointer; width: 100%; font-size: 14px; }
    .submit { margin-top: 18px; padding: 14px; font-size: 16px; font-weight: 700;
              background: #3158d8; color: white; border: none; border-radius: 10px; cursor: pointer; width: 100%; }
    .submit:disabled { background: #a0a0a0; cursor: not-allowed; }
    .banner { padding: 10px 12px; border-radius: 8px; font-size: 14px; margin: 10px 0; }
    .banner.ok { background: #e6f7ec; color: #1a5e2a; border: 1px solid #88c299; }
    .banner.err { background: #fdecec; color: #8f1d1d; border: 1px solid #e4a2a2; }
    .banner.info { background: #eaf2fd; color: #1a3b7a; border: 1px solid #9bb8df; }
    .meta { font-size: 12px; color: #777; margin-top: 12px; }
    .test-badge { display: inline-block; background: #ffc107; color: #333;
                  font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
  </style>
</head>
<body>
  <h1>送迎報告
    <? if (testMode) { ?><span class="test-badge">TEST</span><? } ?>
  </h1>

  <div id="state-loading" class="banner info">読み込み中...</div>
  <div id="state-error" class="banner err" hidden></div>
  <div id="state-success" class="banner ok" hidden></div>

  <div id="login" hidden>
    <div class="row">
      <label>表示名</label>
      <select id="login-name" required><option value="">選択</option></select>
    </div>
    <div class="row">
      <label>PIN</label>
      <input id="login-pin" type="password" inputmode="numeric" autocomplete="off" required>
    </div>
    <button type="button" class="submit" id="login-btn">ログイン</button>
  </div>

  <form id="form" hidden>
    <div class="row">
      <label>運転者</label>
      <div id="driver-readonly" class="readonly" aria-readonly="true"></div>
    </div>

    <div class="row">
      <label>車両</label>
      <select name="vehicle" required><option value="">選択</option></select>
    </div>

    <div class="row">
      <label>区分</label>
      <div class="mode-toggle">
        <button type="button" data-mode="通常ルート" class="active">通常ルート</button>
        <button type="button" data-mode="バス">バス</button>
      </div>
      <input type="hidden" name="mode" value="通常ルート">
    </div>

    <!-- 修理16: 出発ブロック (地点 + ODO + 写真) をまとめて上に、その後に到着リスト。
         到着を挟んで出発情報が分断されないレイアウト。 -->
    <div class="row">
      <label>出発地</label>
      <select name="from" required><option value="">選択</option></select>
    </div>

    <div class="row">
      <label>ODO (出発)</label>
      <input type="number" name="odoStart" inputmode="numeric" required>
    </div>

    <div class="row" id="depart-photo-row">
      <label>出発時の写真 (任意)</label>
      <input type="file" id="depart-photo" accept="image/*" capture="environment">
    </div>

    <div class="row arrivals">
      <label>到着 (1-8)</label>
      <div id="arrivals-list"></div>
      <button type="button" class="add-btn" id="add-arrival">＋ 到着を追加</button>
    </div>

    <div class="row" id="odo-end-row">
      <label>ODO (到着 / バス時のみ)</label>
      <input type="number" name="odoEnd" inputmode="numeric">
    </div>

    <div class="row">
      <label>備考 (任意)</label>
      <textarea name="note" rows="2"></textarea>
    </div>

    <button type="submit" class="submit" id="submit">保存</button>
    <div class="meta" id="user-meta"></div>
  </form>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    var LIFF_ID = <?= JSON.stringify(liffId) ?>;
    var TEST_MODE = <?= testMode ? 'true' : 'false' ?>;

    // UI state only. 運転者名 (保存正本) はクライアントに持たせない —
    // server-side の 送迎PINマスタ.運転者名 が唯一の真実。
    // PIN はメモリ上だけに保持して送信時にサーバへ渡す。localStorage 等に書かない。
    var state = {
      loginName: null,
      pin: null,
      locations: [],
      mode: '通常ルート',
    };

    function $(s) { return document.querySelector(s); }
    function show(el) { el.hidden = false; }
    function hide(el) { el.hidden = true; }

    function setError(msg) {
      hide($('#state-loading'));
      hide($('#state-success'));
      var el = $('#state-error'); el.textContent = msg; show(el);
    }
    function setSuccess(msg) {
      hide($('#state-loading'));
      hide($('#state-error'));
      var el = $('#state-success'); el.textContent = msg; show(el);
    }

    function renderLocationOptions(selectEl, locations) {
      selectEl.innerHTML = '<option value="">選択</option>';
      locations.forEach(function(loc) {
        var o = document.createElement('option');
        o.value = loc; o.textContent = loc;
        selectEl.appendChild(o);
      });
    }

    function addArrival() {
      var list = $('#arrivals-list');
      if (list.children.length >= 8) return;
      var wrap = document.createElement('div');
      wrap.className = 'arrival-row';
      wrap.style.margin = '10px 0';
      wrap.style.padding = '8px';
      wrap.style.border = '1px solid #ddd';
      wrap.style.borderRadius = '8px';
      // 1行目: select + ODO + 削除
      var line1 = document.createElement('div');
      line1.style.display = 'flex';
      line1.style.gap = '6px';
      line1.style.alignItems = 'center';
      var sel = document.createElement('select');
      sel.name = 'arrival';
      sel.style.flex = '2';
      renderLocationOptions(sel, state.locations);
      if (state.mode === 'バス') sel.disabled = true;
      line1.appendChild(sel);
      var odoInput = document.createElement('input');
      odoInput.type = 'number';
      odoInput.inputMode = 'numeric';
      odoInput.name = 'arrivalOdo';
      odoInput.placeholder = 'ODO 到着';
      odoInput.style.flex = '1';
      odoInput.style.minWidth = '90px';
      if (state.mode === 'バス') odoInput.disabled = true;
      line1.appendChild(odoInput);
      var btn = document.createElement('button');
      btn.type = 'button'; btn.className = 'remove'; btn.textContent = '×';
      btn.onclick = function() { wrap.remove(); };
      line1.appendChild(btn);
      wrap.appendChild(line1);
      // 2行目: 到着地写真 (修理15)
      var photo = document.createElement('input');
      photo.type = 'file';
      photo.name = 'arrivalPhoto';
      photo.accept = 'image/*';
      photo.capture = 'environment';
      photo.style.marginTop = '6px';
      photo.style.fontSize = '13px';
      photo.style.width = '100%';
      if (state.mode === 'バス') photo.disabled = true;
      wrap.appendChild(photo);
      list.appendChild(wrap);
    }

    function getArrivals() {
      return Array.prototype.slice.call($('#arrivals-list').querySelectorAll('select'))
        .map(function(s) { return s.value; })
        .filter(function(v) { return v; });
    }

    // 修理14: 到着 select と ODO input は同じ arrival-row に並んでいる。
    // 空欄 select の行は除外して、残った行の arrivalOdo を数値化して返す。
    // 返り値の length は getArrivals() と一致する (saveReport の検証前提)。
    function getArrivalOdos() {
      return Array.prototype.slice.call($('#arrivals-list').querySelectorAll('.arrival-row'))
        .map(function(row) {
          var s = row.querySelector('select[name=arrival]');
          var o = row.querySelector('input[name=arrivalOdo]');
          return { arrival: s ? s.value : '', odo: o ? o.value : '' };
        })
        .filter(function(p) { return p.arrival; })
        .map(function(p) { return p.odo === '' ? null : Number(p.odo); });
    }

    // 修理15: 各到着地点の写真 File オブジェクトを 到着 select が埋まっている行だけ集める。
    // 返り値の length = getArrivals() と一致 (写真なしの到着は null)。
    function getArrivalPhotoFiles() {
      return Array.prototype.slice.call($('#arrivals-list').querySelectorAll('.arrival-row'))
        .map(function(row) {
          var s = row.querySelector('select[name=arrival]');
          var p = row.querySelector('input[name=arrivalPhoto]');
          return { arrival: s ? s.value : '', file: (p && p.files && p.files[0]) ? p.files[0] : null };
        })
        .filter(function(x) { return x.arrival; })
        .map(function(x) { return x.file; });
    }

    // 修理15: File → ブラウザ内でリサイズ → base64 JPEG へ圧縮。
    // 最大辺 1600px / JPEG 品質 0.8 (1 枚 ~200-400KB、UrlFetchApp の 50MB 上限に対して余裕)。
    // base64 prefix (data:image/jpeg;base64,) ごと返すので server は comma split で剥がす。
    function fileToResizedDataUrl(file, cb) {
      if (!file) { cb(null, ''); return; }
      var reader = new FileReader();
      reader.onerror = function() { cb(new Error('file_read_failed')); };
      reader.onload = function(e) {
        var img = new Image();
        img.onerror = function() { cb(new Error('image_decode_failed')); };
        img.onload = function() {
          var maxSide = 1600;
          var scale = Math.min(1, maxSide / Math.max(img.width, img.height));
          var w = Math.round(img.width * scale);
          var h = Math.round(img.height * scale);
          var canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          cb(null, canvas.toDataURL('image/jpeg', 0.8));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function resizeAllFiles(files, onDone) {
      if (!files || files.length === 0) { onDone([]); return; }
      var results = new Array(files.length);
      var done = 0, failed = false;
      files.forEach(function(f, i) {
        fileToResizedDataUrl(f, function(err, dataUrl) {
          if (failed) return;
          if (err) { failed = true; onDone(null, err); return; }
          results[i] = dataUrl;
          done++;
          if (done === files.length) onDone(results);
        });
      });
    }

    function renderFormFromMasters(m) {
      // 運転者は read-only 表示 (allowlist.driver_name を server から受け取ったもの)
      var driverLabel = m.driverName || m.displayName || '(未設定)';
      $('#driver-readonly').textContent = driverLabel;

      var vehSel = $('select[name=vehicle]');
      vehSel.innerHTML = '<option value="">選択</option>';
      m.vehicles.forEach(function(v) {
        var o = document.createElement('option'); o.value = v; o.textContent = v;
        vehSel.appendChild(o);
      });

      state.locations = m.locations;
      renderLocationOptions($('select[name=from]'), m.locations);
      addArrival();

      var metaName = m.displayName || m.driverName || '';
      $('#user-meta').textContent = '投稿者: ' + metaName + (TEST_MODE ? '  [test sheet]' : '');
      show($('#form'));
      // 修理14: 初期は通常ルート → odoEnd 行を隠す
      applyModeUI_();
    }

    function applyModeUI_() {
      // バスモードは from / arrivals を問わない (既存本線と揃える)。
      // 通常ルートは from 必須 + arrivals 1件以上。
      var isBus = state.mode === 'バス';
      var fromSel = $('select[name=from]');
      if (isBus) {
        fromSel.removeAttribute('required');
        fromSel.value = '';
        fromSel.disabled = true;
      } else {
        fromSel.setAttribute('required', 'required');
        fromSel.disabled = false;
      }
      // arrivals 行 (到着 select + ODO 到着N) は視覚的に disabled、送信時も空で送る
      var arrList = $('#arrivals-list');
      arrList.querySelectorAll('select[name=arrival]').forEach(function(s) {
        s.disabled = isBus;
        if (isBus) s.value = '';
      });
      arrList.querySelectorAll('input[name=arrivalOdo]').forEach(function(o) {
        o.disabled = isBus;
        if (isBus) o.value = '';
      });
      arrList.querySelectorAll('input[name=arrivalPhoto]').forEach(function(p) {
        p.disabled = isBus;
        if (isBus) p.value = '';
      });
      $('#add-arrival').disabled = isBus;
      var fromRow = fromSel.parentElement;
      fromRow.style.opacity = isBus ? '0.5' : '1';
      $('.arrivals').style.opacity = isBus ? '0.5' : '1';
      // 修理14: ODO(到着) 単独欄はバス時のみ必須/表示。通常ルートは arrivalOdos から導出する。
      var odoEndInput = $('input[name=odoEnd]');
      var odoEndRow = $('#odo-end-row');
      if (isBus) {
        odoEndInput.setAttribute('required', 'required');
        odoEndRow.style.display = '';
        odoEndRow.style.opacity = '1';
      } else {
        odoEndInput.removeAttribute('required');
        odoEndInput.value = '';
        odoEndRow.style.display = 'none';
      }
    }

    document.querySelectorAll('.mode-toggle button').forEach(function(b) {
      b.addEventListener('click', function() {
        document.querySelectorAll('.mode-toggle button').forEach(function(x) { x.classList.remove('active'); });
        b.classList.add('active');
        state.mode = b.getAttribute('data-mode');
        $('input[name=mode]').value = state.mode;
        applyModeUI_();
      });
    });

    $('#add-arrival').addEventListener('click', addArrival);

    $('#form').addEventListener('submit', function(ev) {
      ev.preventDefault();
      hide($('#state-error'));
      hide($('#state-success'));
      var f = ev.target;
      var isBus = state.mode === 'バス';
      var arrivals = getArrivals();
      if (!isBus && arrivals.length === 0) {
        setError('到着地を 1 つ以上選択してください');
        return;
      }
      // 運転者 / 報告時刻はクライアント側で組まない — server が 送迎PINマスタ と new Date() で確定する。
      // バスは from / arrivals を空で送る (既存本線と揃える)。
      // 修理14: 通常ルートは arrivalOdos (各到着地点の累積 ODO) を送る。
      //         バスは odoEnd を従来通り送る (Q..X は server 側で空のまま)。
      var arrivalOdos = isBus ? [] : getArrivalOdos();
      if (!isBus) {
        if (arrivalOdos.length !== arrivals.length) {
          setError('各到着地点の ODO (到着) を全て入力してください');
          return;
        }
        if (arrivalOdos.some(function(v) { return v === null || !isFinite(v); })) {
          setError('ODO (到着) を数値で入力してください');
          return;
        }
      }
      // 修理15: 写真を先にリサイズして、完了後に saveReport を呼ぶ (非同期)。
      var departFile = $('#depart-photo').files[0] || null;
      var arrivalFiles = isBus ? [] : getArrivalPhotoFiles();
      $('#submit').disabled = true;
      setSuccess('写真を処理中...');
      resizeAllFiles([departFile].concat(arrivalFiles), function(dataUrls, err) {
        if (err) {
          setError('写真処理失敗: ' + err.message);
          $('#submit').disabled = false;
          return;
        }
        var departDataUrl = dataUrls[0] || '';
        var arrivalDataUrls = dataUrls.slice(1);
        var hasAnyPhoto = !!(departDataUrl) || arrivalDataUrls.some(function(u){ return u; });
        var photos = hasAnyPhoto ? { depart: departDataUrl, arrivals: arrivalDataUrls } : null;
        var payload = {
          loginName: state.loginName,
          pin: state.pin,
          vehicle: f.vehicle.value,
          mode: state.mode,
          from: isBus ? '' : f.from.value,
          arrivals: isBus ? [] : arrivals,
          arrivalOdos: arrivalOdos,
          odoStart: Number(f.odoStart.value),
          odoEnd: isBus ? Number(f.odoEnd.value) : 0,
          note: f.note.value,
          photos: photos,
        };
        setSuccess('送信中...');
        google.script.run
          .withSuccessHandler(function(res) {
            setSuccess('保存しました (' + res.savedAt + ')');
            f.reset();
            $('#arrivals-list').innerHTML = '';
            addArrival();
            $('#depart-photo').value = '';
            $('#submit').disabled = false;
          })
          .withFailureHandler(function(errX) {
            var msg = (errX && errX.message) ? errX.message : String(errX);
            var human = humanizeError_(msg);
            setError(human);
            $('#submit').disabled = false;
          })
          .saveReport(payload);
      });
    });

    function humanizeError_(msg) {
      if (msg.indexOf('unauthorized:user_not_registered') === 0) return '送迎PINマスタに登録がありません';
      if (msg.indexOf('unauthorized:pin_mismatch') === 0) return 'PIN が違います';
      if (msg.indexOf('unauthorized:inactive_user') === 0) return '利用者が無効化されています';
      if (msg.indexOf('unauthorized:pickup_not_permitted') === 0) return '送迎利用が許可されていません';
      if (msg.indexOf('unauthorized:missing_driver_name') === 0) return '送迎PINマスタの 運転者名 が未設定です';
      if (msg.indexOf('unauthorized:missing_login_name') === 0) return '表示名を選択してください';
      if (msg.indexOf('unauthorized:missing_pin') === 0) return 'PIN を入力してください';
      if (msg.indexOf('invalid:too_many_arrivals') === 0) return '到着地は最大 8 件です';
      if (msg.indexOf('invalid:missing_odo') === 0) return 'ODO を数値で入力してください';
      if (msg.indexOf('invalid:odo_end_before_start') === 0) return 'ODO (到着) は ODO (出発) 以上にしてください';
      if (msg === 'driver_not_in_master') return '送迎PINマスタの 運転者名 が 運転者マスタに存在しません';
      if (msg === 'vehicle_not_registered') return '車両が 車両マスタに未登録です';
      if (msg === 'location_not_registered') return '地点が 地点マスタに未登録です';
      if (msg === 'fare_not_registered') return '料金マスタが未登録です。管理者に連絡してください';
      // 距離マスタは optional (旧送迎本線と同じ思想)。
      return msg;
    }

    function tryInitLiff_() {
      // LIFF SDK は入口用に残すが、認証本線ではない。初期化失敗しても UI は起動する。
      if (typeof liff !== 'undefined' && LIFF_ID) {
        try { liff.init({ liffId: LIFF_ID }); } catch (_) { /* ignore */ }
      }
    }

    $('#login-btn').addEventListener('click', function() {
      var name = $('#login-name').value;
      var pin  = $('#login-pin').value;
      if (!name) { setError('表示名を選択してください'); return; }
      if (!pin)  { setError('PIN を入力してください'); return; }
      hide($('#state-error'));
      $('#login-btn').disabled = true;
      google.script.run
        .withSuccessHandler(function(m) {
          state.loginName = name;
          state.pin = pin;
          hide($('#login'));
          hide($('#state-loading'));
          renderFormFromMasters(m);
          $('#login-btn').disabled = false;
          $('#login-pin').value = '';
        })
        .withFailureHandler(function(err) {
          var msg = (err && err.message) ? err.message : String(err);
          setError(humanizeError_(msg.indexOf('unauthorized:') === 0 ? msg : 'unauthorized:' + msg));
          $('#login-btn').disabled = false;
        })
        .loginAndLoadMasters(name, pin);
    });

    (function bootstrap() {
      tryInitLiff_();
      google.script.run
        .withSuccessHandler(function(names) {
          hide($('#state-loading'));
          var sel = $('#login-name');
          sel.innerHTML = '<option value="">選択</option>';
          (names || []).forEach(function(n) {
            var o = document.createElement('option');
            o.value = n; o.textContent = n;
            sel.appendChild(o);
          });
          show($('#login'));
        })
        .withFailureHandler(function(err) {
          var msg = (err && err.message) ? err.message : String(err);
          setError('ログイン名の読込に失敗しました: ' + msg);
        })
        .loadPickupLoginNames();
    })();
  </script>
</body>
</html>
